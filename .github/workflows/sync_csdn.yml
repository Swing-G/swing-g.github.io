name: Sync CSDN Articles

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install axios cheerio

    - name: Fetch CSDN articles
      run: |
        node -e "
        const axios = require('axios');
        const cheerio = require('cheerio');
        const fs = require('fs');

        const CSDN_USERNAME = 'm0_58782205';
        const url = 'https://blog.csdn.net/' + CSDN_USERNAME;

        axios.get(url, {
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
        }).then(res => {
          const $ = cheerio.load(res.data);
          const articles = [];

          $('.article-list .article-item-box').each((i, el) => {
            if (i >= 3) return false;
            const title = $(el).find('h4 a').text().replace(/[\r\n\s]+/g, ' ').trim();
            const link = $(el).find('h4 a').attr('href');
            const desc = $(el).find('.content').text().replace(/[\r\n\s]+/g, ' ').trim().substring(0, 80);
            let cover = $(el).find('.article-list-img img').attr('src');
            if (!cover) cover = '';
            articles.push({ title, link, description: desc, coverImage: cover, platform: 'CSDN' });
          });

          fs.writeFileSync('csdn_articles.json', JSON.stringify(articles, null, 2));
          console.log('Fetched', articles.length, 'articles');
        }).catch(err => {
          console.error('Fetch error:', err.message);
          // write fallback empty array so the site doesn't break
          fs.writeFileSync('csdn_articles.json', '[]');
          process.exit(0);
        });
        "

    - name: Commit and push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add csdn_articles.json
        git diff --staged --quiet || git commit -m "chore: sync CSDN articles [skip ci]"
        git push
