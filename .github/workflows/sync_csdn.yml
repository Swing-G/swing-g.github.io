name: Sync CSDN Articles

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install axios cheerio

    - name: Fetch CSDN articles
      run: |
        node -e "
        const axios = require('axios');
        const cheerio = require('cheerio');
        const fs = require('fs');

        const CSDN_USERNAME = 'm0_58782205';
        const url = 'https://blog.csdn.net/' + CSDN_USERNAME;

        axios.get(url, {
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            'Accept-Language': 'zh-CN,zh;q=0.9'
          },
          timeout: 10000
        }).then(res => {
          const $ = cheerio.load(res.data);
          const articles = [];

          const listItems = $('.article-list .article-item-box, .mainContent .article-list-item');

          listItems.each((i, el) => {
            if (i >= 3) return false;

            const title = $(el).find('h4 a, .title a').first().text().replace(/[\r\n\s]+/g, ' ').trim() || '无标题';
            const link = $(el).find('h4 a, .title a').first().attr('href') || '';

            const desc = $(el).find('.content, .description, .summary').first().text().replace(/[\r\n\s]+/g, ' ').trim().substring(0, 80);

            let cover = $(el).find('.article-list-img img, .cover img').first().attr('src') || '';
            if (cover && cover.startsWith('//')) {
              cover = 'https:' + cover;
            } else if (!cover) {
              cover = 'https://g.csdnimg.cn/static/logo/favicon.reply.ico';
            }

            const tags = [];
            $(el).find('.tag, .article-tag, .b-box').each((index, tagEl) => {
              const tagText = $(tagEl).text().trim();
              if (tagText && isNaN(tagText) && tagText.length < 10) {
                tags.push(tagText);
              }
            });

            articles.push({
              title,
              link,
              description: desc,
              coverImage: cover,
              tags: tags.length ? tags : ['技术分享'],
              platform: 'CSDN'
            });
          });

          fs.writeFileSync('csdn_articles.json', JSON.stringify(articles, null, 2));
          console.log('Fetched', articles.length, 'articles');
        }).catch(err => {
          console.error('Fetch error:', err.message);
          fs.writeFileSync('csdn_articles.json', '[]');
          process.exit(0);
        });
        "

    - name: Commit and push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add csdn_articles.json
        git diff --staged --quiet || (git commit -m "chore: sync CSDN articles [skip ci]" && git push)
